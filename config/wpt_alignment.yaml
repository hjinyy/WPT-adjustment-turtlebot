ros:
  cmd_vel_topic: /cmd_vel

# four_coil_map: default. Uses the 16 markers around the 4 physical coils
# (11-14/21-24/31-34/41-44) that are already printed for the no-ROS 3x3-grid
# workflow (see README) -- no re-printing needed to use this layout mode.
layout_mode: four_coil_map
target_coil: coil_1

apriltag:
  family: tag36h11

safety:
  dry_run: true
  tag_lost_timeout_sec: 1.0

# Device numbers match the physical wiring documented in README ("카메라 포트 확인"):
# front=/dev/video0, right=/dev/video2, left=/dev/video4.
# 320x240 MJPG @10fps keeps CPU/USB load low on the Pi during three-camera capture.
cameras:
  front: {device: 0, width: 320, height: 240, fps: 10, fourcc: MJPG}
  right_bottom: {device: 2, width: 320, height: 240, fps: 10, fourcc: MJPG}
  left_bottom: {device: 4, width: 320, height: 240, fps: 10, fourcc: MJPG}

speed:
  corridor_linear: 0.06
  shelf_entry_linear: 0.025
  head_max_linear: 0.05
  head_max_angular: 0.18
  head_min_linear: 0.01
  head_min_angular: 0.02
  coil_max_linear: 0.015
  coil_max_angular: 0.08
  coil_min_linear: 0.004
  coil_min_angular: 0.015

# Coil-to-coil transit over the black tape (scripts/drive_between_coils.py).
# Side cameras track the tape; a Kalman filter smooths the lateral/heading
# error; the front camera stops the robot the moment the target coil's
# travel-direction marker appears. Steering gain signs depend on camera
# mounting -- verify with --dry-run first.
# Two-phase leg profile keyed to the measured coil-center distances
# (vertical 25.5 cm, horizontal 45.3 cm -- see coil_transit.py). CRUISE covers
# cruise_fraction of the distance at line_follow.cruise_linear, then APPROACH
# slows to approach_linear until BOTH of the target's flanking side markers are
# visible (within side_marker_freshness_sec) AND its travel-direction head
# marker appears on the front camera -> immediate stop.
transit:
  cruise_fraction: 0.6
  approach_linear: 0.02
  side_marker_freshness_sec: 0.7

line_follow:
  loop_hz: 10.0
  cruise_linear: 0.05
  k_x_to_angular: -0.003
  k_angle_to_angular: -0.010
  max_angular: 0.3
  x_deadband_px: 3
  angle_deadband_deg: 1.0
  invert_angular: false
  line_lost_timeout_sec: 1.0
  detector: {threshold: 80, min_area_px: 120, roi_top_ratio: 0.0, roi_bottom_ratio: 1.0}
  kalman: {process_variance: 1.0, measurement_variance: 4.0}

alignment:
  stable_frames_required: 10
  final_pair: west_east
  rotation_verify_pair: north_south
  head: {threshold_x_px: 12, threshold_y_px: 12, threshold_angle_deg: 8}
  coil: {threshold_x_px: 4, threshold_y_px: 4, threshold_angle_deg: 2.0}
  # SEARCH_COIL (coarse approach while the pair isn't visible) and the ALIGN_COIL
  # occlusion recovery back-off. See docs/algorithm.md "coil search / recovery".
  search:
    burst_linear: 0.03           # m/s during a forward search burst, no rotation
    burst_duration_sec: 0.6
    pause_duration_sec: 0.6      # stopped; only look for tags during this window
    recover_reverse_duration_sec: 0.4  # undo the last ALIGN_COIL move before searching again
    max_duration_sec: 20.0       # safety cap; state -> ERROR if exceeded

# Pixel targets below are tuned for the 320x240 capture size above. Re-calibrate
# per docs/calibration.md if the resolution changes.
coils:
  coil_1:
    label: shelf_1_1
    markers: {north: 11, south: 12, west: 13, east: 14}
    targets:
      front:
        default: {x: 160, y: 120, angle_deg: 0}
      left_bottom:
        west_east: {x: 160, y: 110, angle_deg: 0}
        north_south: {x: 160, y: 110, angle_deg: 90}
        default: {x: 160, y: 110, angle_deg: 0}
      right_bottom:
        west_east: {x: 160, y: 115, angle_deg: 180}
        north_south: {x: 160, y: 115, angle_deg: -90}
        default: {x: 160, y: 115, angle_deg: 180}
  coil_2:
    label: shelf_1_2
    markers: {north: 21, south: 22, west: 23, east: 24}
    targets:
      front:
        default: {x: 160, y: 120, angle_deg: 0}
      left_bottom:
        west_east: {x: 160, y: 110, angle_deg: 0}
        north_south: {x: 160, y: 110, angle_deg: 90}
        default: {x: 160, y: 110, angle_deg: 0}
      right_bottom:
        west_east: {x: 160, y: 115, angle_deg: 180}
        north_south: {x: 160, y: 115, angle_deg: -90}
        default: {x: 160, y: 115, angle_deg: 180}
  coil_3:
    label: shelf_2_1
    markers: {north: 31, south: 32, west: 33, east: 34}
    targets:
      front:
        default: {x: 160, y: 120, angle_deg: 0}
      left_bottom:
        west_east: {x: 160, y: 110, angle_deg: 0}
        north_south: {x: 160, y: 110, angle_deg: 90}
        default: {x: 160, y: 110, angle_deg: 0}
      right_bottom:
        west_east: {x: 160, y: 115, angle_deg: 180}
        north_south: {x: 160, y: 115, angle_deg: -90}
        default: {x: 160, y: 115, angle_deg: 180}
  coil_4:
    label: shelf_2_2
    markers: {north: 41, south: 42, west: 43, east: 44}
    targets:
      front:
        default: {x: 160, y: 120, angle_deg: 0}
      left_bottom:
        west_east: {x: 160, y: 110, angle_deg: 0}
        north_south: {x: 160, y: 110, angle_deg: 90}
        default: {x: 160, y: 110, angle_deg: 0}
      right_bottom:
        west_east: {x: 160, y: 115, angle_deg: 180}
        north_south: {x: 160, y: 115, angle_deg: -90}
        default: {x: 160, y: 115, angle_deg: 180}

control:
  loop_hz: 10.0
  head:
    k_y_to_linear: -0.0006
    k_x_to_angular: -0.0020
    k_angle_to_angular: -0.0040
    x_deadband_px: 10
    y_deadband_px: 10
    angle_deadband_deg: 3
    invert_linear: false
    invert_angular: false
  coil:
    k_y_to_linear: -0.00025
    k_x_to_angular: -0.0009
    k_angle_to_angular: -0.0025
    x_deadband_px: 3
    y_deadband_px: 3
    angle_deadband_deg: 0.8
    invert_linear: false
    invert_angular: false
